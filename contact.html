<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Contact - Fresh Fruit</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-sm">
    <a class="navbar-brand" href="index.html">Fresh Fruit</a>
</nav>

<main class="container mt-4">

    <h1 class="text-center">Contact Us</h1>

    <p class="text-center">We’d love to hear from you.</p>

    <form>

        <div class="form-group">
            <label>Name</label>
            <input class="form-control" type="text">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input class="form-control" type="email">
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input class="form-control" type="tel">
        </div>

        <div class="form-group">
            <label>Message</label>
            <textarea class="form-control" rows="5"></textarea>
        </div>

        <button class="btn btn-success btn-block">Send</button>

    </form>

</main>

<footer class="bg-dark text-white text-center p-3 mt-4">
    <p>&copy; Fresh Fruit Market</p>
</footer>

</body>
</html>
